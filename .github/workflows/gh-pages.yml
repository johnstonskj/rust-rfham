name: mdbook to Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Test and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write # To push a branch 
      pull-requests: write # To create a PR from that branch

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Install mdbook binary via cargo
        run: (test -x $HOME/.cargo/bin/mdbook || cargo install --vers "^0.4" mdbook)

      - name: Build and test book
        run: mdbook build && mdbook test # In case of custom book path: mdbook build path/to/mybook && mdbook test path/to/mybook

      - name: Deploy to pages
        uses: JamesIves/github-pages-deploy-action@4.1.7
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: rust-rfham.github.io/mdbook # The folder the action should deploy.
